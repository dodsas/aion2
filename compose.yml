name: aion2

# rootless Podman: podman-compose 가 서비스들을 pod 로 묶는데, pod 와 userns_mode 를
# 함께 쓰면 충돌한다. 단일 컨테이너라 pod 불필요 → 비활성화 (yclaude 와 동일).
x-podman:
  in_pod: false

services:
  aion2:
    build:
      context: .
      dockerfile: Dockerfile
    image: localhost/aion2:${IMAGE_TAG:-latest}
    container_name: aion2
    restart: always
    # rootless Podman: 컨테이너 uid=1000(app) 을 호스트 실행 사용자(dodsas) uid 로 매핑.
    userns_mode: "keep-id"
    ports:
      - "${HOST_PORT:-9092}:8770"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8770/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s
